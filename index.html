<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #2b579a;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 18px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lang-select, .icon-btn {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid white;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .lang-select option {
            color: black;
        }

        .icon-btn {
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: none;
        }

        .container {
            max-width: 500px;
            margin: 20px auto 80px auto;
            padding: 15px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            color: var(--primary-color);
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            margin-top: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            color: white;
        }

        .btn-map { background-color: #2b579a; }
        .btn-copy { background-color: #27ae60; }
        .btn-share { background-color: #e67e22; }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-top: 15px;
            display: none;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            display: flex;
            box-shadow: 0 -2px 10px var(--shadow);
            border-top: 1px solid var(--border-color);
            z-index: 999;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-weight: bold;
            color: #888888;
        }

        .nav-item.active {
            color: var(--primary-color);
            border-top: 3px solid var(--primary-color);
        }

        .file-input { display: none; }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 10000;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stats-box {
            background-color: rgba(43, 87, 154, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            border: 1px dashed var(--primary-color);
        }

        .table-container {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-top: 10px;
        }

        .record-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }

        .record-table th, .record-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .record-table th {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .record-table tr:hover {
            background-color: rgba(0,0,0,0.05);
        }

        body[dir="rtl"] .input-group label { text-align: right; }
        body[dir="rtl"] .record-table { text-align: right; }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Subscription Tracker</h1>
        <div class="header-controls">
            <select class="lang-select" id="lang-change" onchange="changeLanguage(this.value)">
                <option value="bn">বাংলা</option>
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="hi">हिन्दी</option>
            </select>
            <button class="icon-btn" onclick="toggleTheme()" title="Theme">🌙</button>
        </div>
    </header>

    <div class="container">
        <div id="search-screen" class="screen active">
            <div class="card">
                <h2 id="lbl-search-title">সাবস্ক্রিপশন লোকেশন খুঁজুন</h2>
                <div class="input-group">
                    <input type="number" id="search-input" placeholder="সাবস্ক্রিপশন নাম্বারটি লিখুন..." pattern="[0-9]*" inputmode="numeric">
                </div>
                <button class="btn" id="btn-search" onclick="searchLocation()">🔍 সার্চ করুন</button>

                <div id="result-box" class="card" style="display:none; margin-top:20px; border-left: 5px solid var(--primary-color); padding: 15px;">
                    <p><strong id="lbl-res-num">📌 সাবস্ক্রিপশন নং:</strong> <span id="res-num"></span></p>
                    <p><strong id="lbl-res-loc">📍 লোকেশন:</strong> <span id="res-loc"></span></p>
                    
                    <div class="action-buttons">
                        <button class="btn-map" id="btn-map" onclick="openMap()">🗺️ ম্যাপ</button>
                        <button class="btn-copy" id="btn-copy" onclick="copyLocation()">📋 কপি</button>
                        <button class="btn-share" id="btn-share" onclick="shareLocation()">🔗 শেয়ার</button>
                    </div>

                    <div id="map-area" class="map-container">
                        <iframe id="map-frame" src="" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
                <p id="not-found" style="text-align:center; color:red; display:none; margin-top:15px;"></p>
            </div>
        </div>

        <div id="add-screen" class="screen">
            <div class="card">
                <h2 id="lbl-add-title">নতুন লোকেশন সেট করুন</h2>
                <div class="input-group">
                    <label id="lbl-sub-num-field">সাবস্ক্রিপশন নাম্বার (শুধুমাত্র সংখ্যা)</label>
                    <input type="number" id="sub-number" placeholder="উদা: 12301001" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label id="lbl-loc-field">লোকেশন / ঠিকানা</label>
                    <input type="text" id="sub-location" placeholder="ঠিকানা বা ম্যাপ কোঅর্ডিনেট (যেমন: 23.8103, 90.4125)">
                </div>
                <button class="btn btn-outline" id="btn-current-loc" onclick="getCurrentLocation()">📍 আমার কারেন্ট লোকেশন নিন</button>
                <button class="btn" style="margin-top: 20px;" id="btn-save" onclick="saveData()">💾 লোকেশন সেভ করুন</button>
            </div>
        </div>

        <div id="auth-screen" class="screen">
            <div class="card">
                <h2 id="lbl-auth-title">🔐 এডমিন ভেরিফিকেশন</h2>
                <p style="text-align:center; font-size:14px; margin-bottom:20px;" id="lbl-auth-desc">সেটিংস পরিবর্তনের জন্য এডমিন পাসওয়ার্ড লিখুন</p>
                <div class="input-group">
                    <input type="password" id="admin-password" placeholder="পাসওয়ার্ড লিখুন...">
                </div>
                <button class="btn" onclick="verifyAdminPassword()" id="btn-auth-confirm">🔓 প্রবেশ করুন</button>
                <button class="btn btn-outline" onclick="switchScreen('search-screen', 'nav-search')" id="btn-auth-cancel">বাতিল করুন</button>
            </div>
        </div>

        <div id="settings-screen" class="screen">
            <div class="card">
                <h2 id="lbl-settings-title">⚙️ সেটিংস ও মেমোরি ম্যানেজমেন্ট</h2>
                
                <div class="stats-box" id="stats-box">📊 মোট রেকর্ডকৃত ডাটা: 0 টি</div>

                <div class="input-group" style="margin-top:10px;">
                    <label id="lbl-table-search">🔎 সংরক্ষিত রেকর্ড টেবিল সার্চ</label>
                    <input type="number" id="table-search-input" placeholder="সাবস্ক্রিপশন নাম্বার দিয়ে টেবিল ফিল্টার করুন..." oninput="filterRecordTable()" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="table-container">
                    <table class="record-table">
                        <thead>
                            <tr>
                                <th id="th-sub">সাবস্ক্রিপশন নং</th>
                                <th id="th-loc">লোকেশন</th>
                            </tr>
                        </thead>
                        <tbody id="record-table-body">
                        </tbody>
                    </table>
                </div>
                
                <hr style="border:0; border-top:1px solid var(--border-color); margin:20px 0;">

                <div class="input-group">
                    <label id="lbl-export">ব্যাকআপ ডাটা আউটপুট (Export JSON)</label>
                    <button class="btn btn-outline" onclick="exportData()">📤 ডাটা এক্সপোর্ট করুন</button>
                </div>
                
                <hr style="border:0; border-top:1px solid var(--border-color); margin:20px 0;">
                
                <div class="input-group">
                    <label style="color:#27ae60;">📥 সরাসরি এক্সেল বা জেসন ইম্পোর্ট (Import XLSX / JSON)</label>
                    <button class="btn" style="background-color:#27ae60;" onclick="document.getElementById('import-file').click()">📂 এক্সেল (.xlsx) বা .json ফাইল বাছুন</button>
                    <input type="file" id="import-file" class="file-input" accept=".json,.xlsx,.cvs,.xls" onchange="handleFileImport(event)">
                </div>

                <hr style="border:0; border-top:1px solid var(--border-color); margin:20px 0;">

                <div class="input-group">
                    <label id="lbl-memory">লোকাল মেমোরি অপশন (Local Storage)</label>
                    <button class="btn" style="background-color:#c0392b;" onclick="clearMemory()">🗑️ মেমোরি সম্পূর্ণ ক্লিয়ার করুন</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div id="nav-search" class="nav-item active" onclick="switchScreen('search-screen', 'nav-search')">🔍 সার্চ</div>
        <div id="nav-add" class="nav-item" onclick="switchScreen('add-screen', 'nav-add')">➕ নতুন সেট</div>
        <div id="nav-settings" class="nav-item" onclick="handleSettingsNavigation()">⚙️ সেটিংস</div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const languages = {
            bn: {
                title: "Subscription Tracker", searchTitle: "সাবস্ক্রিপশন লোকেশন খুঁজুন", searchBtn: "🔍 সার্চ করুন",
                resNum: "📌 সাবস্ক্রিপশন নং:", resLoc: "📍 লোকেশন:", btnMap: "🗺️ ম্যাপ", btnCopy: "📋 কপি",
                btnShare: "🔗 শেয়ার", notFound: "এই নাম্বারের কোনো লোকেশন পাওয়া যায়নি!", addTitle: "নতুন লোকেশন সেট করুন",
                subNumField: "সাবস্ক্রিপশন নাম্বার (শুধুমাত্র সংখ্যা)", locField: "লোকেশন / ঠিকানা", currentLocBtn: "📍 আমার কারেন্ট লোকেশন নিন",
                saveBtn: "💾 লোকেশন সেভ করুন", settingsTitle: "⚙️ সেটিংস ও মেমোরি", lblExport: "ব্যাকআপ ডাটা আউটপুট (Export JSON)",
                lblMemory: "লোকাল মেমোরি অপশন (Local Storage)", navSearch: "🔍 সার্চ",
                navAdd: "➕ নতুন সেট", navSettings: "⚙️ সেটিংস", emptyAlert: "দয়া করে ফিল্ড পূরণ করুন!", saveAlert: "সফলভাবে সংরক্ষিত হয়েছে!",
                copyAlert: "লোকেশন কপি করা হয়েছে!", clearAlert: "সব ডাটা মুছে ফেলা হয়েছে!", importAlert: "ডাটা সফলভাবে ইম্পোর্ট হয়েছে!",
                invalidAlert: "ভুল ফাইল ফরম্যাট!", authTitle: "🔐 এডমিন ভেরিফিকেশন", authDesc: "সেটিংস পরিবর্তনের জন্য এডমিন পাসওয়ার্ড লিখুন",
                authConfirm: "🔓 প্রবেশ করুন", authCancel: "বাতিল করুন", wrongPass: "ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।",
                statsText: "📊 মোট রেকর্ডকৃত ডাটা: ", tableSearchPlaceholder: "সাবস্ক্রিপশন নাম্বার দিয়ে টেবিল ফিল্টার করুন...",
                lblTableSearch: "🔎 সংরক্ষিত রেকর্ড টেবিল সার্চ", thSub: "সাবস্ক্রিপশন নং", thLoc: "লোকেশন"
            },
            en: {
                title: "Subscription Tracker", searchTitle: "Find Subscription Location", searchBtn: "🔍 Search",
                resNum: "📌 Subscription No:", resLoc: "📍 Location:", btnMap: "🗺️ Map", btnCopy: "📋 Copy",
                btnShare: "🔗 Share", notFound: "No location found for this number!", addTitle: "Set New Location",
                subNumField: "Subscription Number (Numbers Only)", locField: "Location / Address", currentLocBtn: "📍 Use Current Location",
                saveBtn: "💾 Save Location", settingsTitle: "⚙️ Settings & Memory", lblExport: "Backup Data Output (Export JSON)",
                lblMemory: "Local Memory Options", navSearch: "🔍 Search",
                navAdd: "➕ Add New", navSettings: "⚙️ Settings", emptyAlert: "Please fill in the fields!", saveAlert: "Saved successfully!",
                copyAlert: "Location copied to clipboard!", clearAlert: "All data cleared!", importAlert: "Data imported successfully!",
                invalidAlert: "Invalid file format!", authTitle: "🔐 Admin Verification", authDesc: "Enter admin password to modify settings",
                authConfirm: "🔓 Enter", authCancel: "Cancel", wrongPass: "Wrong password! Try again.",
                statsText: "📊 Total Registered Records: ", tableSearchPlaceholder: "Filter table by subscription number...",
                lblTableSearch: "🔎 Saved Records Live Search", thSub: "Sub No", thLoc: "Location"
            }
        };

        let currentLang = 'bn';
        let isAdminAuthenticated = false;

        if (!localStorage.getItem('locationDatabase')) {
            localStorage.setItem('locationDatabase', JSON.stringify({}));
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const l = languages[lang] || languages['bn'];
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('app-title').innerText = l.title;
            document.getElementById('lbl-search-title').innerText = l.searchTitle;
            document.getElementById('btn-search').innerText = l.searchBtn;
            document.getElementById('lbl-res-num').innerText = l.resNum;
            document.getElementById('lbl-res-loc').innerText = l.resLoc;
            document.getElementById('btn-map').innerText = l.btnMap;
            document.getElementById('btn-copy').innerText = l.btnCopy;
            document.getElementById('btn-share').innerText = l.btnShare;
            document.getElementById('lbl-add-title').innerText = l.addTitle;
            document.getElementById('lbl-sub-num-field').innerText = l.subNumField;
            document.getElementById('lbl-loc-field').innerText = l.locField;
            document.getElementById('btn-current-loc').innerText = l.currentLocBtn;
            document.getElementById('btn-save').innerText = l.saveBtn;
            document.getElementById('lbl-settings-title').innerText = l.settingsTitle;
            document.getElementById('lbl-export').innerText = l.lblExport;
            document.getElementById('lbl-memory').innerText = l.lblMemory;
            document.getElementById('lbl-auth-title').innerText = l.authTitle;
            document.getElementById('lbl-auth-desc').innerText = l.authDesc;
            document.getElementById('btn-auth-confirm').innerText = l.authConfirm;
            document.getElementById('btn-auth-cancel').innerText = l.authCancel;
            document.getElementById('nav-search').innerText = l.navSearch;
            document.getElementById('nav-add').innerText = l.navAdd;
            document.getElementById('nav-settings').innerText = l.navSettings;
            
            document.getElementById('lbl-table-search').innerText = l.lblTableSearch;
            document.getElementById('table-search-input').placeholder = l.tableSearchPlaceholder;
            document.getElementById('th-sub').innerText = l.thSub;
            document.getElementById('th-loc').innerText = l.thLoc;
            updateDataStats();
        }

        function switchScreen(screenId, navId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(navId) document.getElementById(navId).classList.add('active');
            if (screenId !== 'settings-screen' && screenId !== 'auth-screen') {
                isAdminAuthenticated = false;
                document.getElementById('admin-password').value = '';
            }
            if (screenId === 'settings-screen') {
                updateDataStats();
                loadRecordTable();
            }
        }

        function handleSettingsNavigation() {
            if (isAdminAuthenticated) {
                switchScreen('settings-screen', 'nav-settings');
            } else {
                switchScreen('auth-screen', 'nav-settings');
            }
        }

        function verifyAdminPassword() {
            if (document.getElementById('admin-password').value === 'admin123') {
                isAdminAuthenticated = true;
                switchScreen('settings-screen', 'nav-settings');
                showToast("🔓 অ্যাক্সেস অ্যাপ্রুভড!");
            } else {
                alert(languages[currentLang].wrongPass);
                document.getElementById('admin-password').value = '';
            }
        }

        function updateDataStats() {
            const db = JSON.parse(localStorage.getItem('locationDatabase')) || {};
            const totalRecords = Object.keys(db).length;
            const l = languages[currentLang] || languages['bn'];
            const unit = currentLang === 'bn' ? " টি" : "";
            document.getElementById('stats-box').innerText = `${l.statsText}${totalRecords}${unit}`;
        }

        function loadRecordTable() {
            const db = JSON.parse(localStorage.getItem('locationDatabase')) || {};
            const tbody = document.getElementById('record-table-body');
            tbody.innerHTML = '';

            // পারফরম্যান্স অপ্টিমাইজেশন: প্রথম ৫০০ রেকর্ড লোড করবে স্পীড বজায় রাখতে
            const keys = Object.keys(db);
            const previewKeys = keys.slice(0, 500);

            previewKeys.forEach(key => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><strong>${key}</strong></td><td>${db[key]}</td>`;
                tbody.appendChild(tr);
            });
        }

        function filterRecordTable() {
            const filterValue = document.getElementById('table-search-input').value.trim();
            const db = JSON.parse(localStorage.getItem('locationDatabase')) || {};
            const tbody = document.getElementById('record-table-body');
            tbody.innerHTML = '';

            if (!filterValue) {
                loadRecordTable();
                return;
            }

            let matchingRows = [];
            let otherRows = [];
            let count = 0;

            Object.keys(db).forEach(key => {
                if (key.includes(filterValue)) {
                    if (count < 300) { // ব্রাউজার ল্যাগ রোধ করতে লিমিট করা হয়েছে
                        matchingRows.push({ num: key, loc: db[key] });
                        count++;
                    }
                }
            });

            matchingRows.forEach(item => {
                const tr = document.createElement('tr');
                tr.style.backgroundColor = "rgba(39, 174, 96, 0.15)";
                tr.innerHTML = `<td><strong>${item.num}</strong></td><td>${item.loc}</td>`;
                tbody.appendChild(tr);
            });
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            showToast("ডাটা প্রসেস হচ্ছে... দয়া করে অপেক্ষা করুন।");
            const filename = file.name.toLowerCase();

            if (filename.endsWith('.xlsx') || filename.endsWith('.xls')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet);

                    const currentDb = JSON.parse(localStorage.getItem('locationDatabase')) || {};
                    
                    rows.forEach(row => {
                        let subNum = row['subscription_number'] || row['Subscription No'] || row['sub_num'];
                        let lat = row['latitude_y'] || row['latitude'] || row['lat'];
                        let lng = row['longitude_x'] || row['longitude'] || row['lng'];
                        
                        if (subNum && lat && lng) {
                            let cleanSub = String(subNum).trim();
                            // যদি শুরুতে অপ্রয়োজনীয় সংখ্যা (যেমন '11') থাকে তবে তা বাদ দিয়ে ফিল্টার করতে পারেন
                            if(cleanSub.startsWith('11') && cleanSub.length > 6) {
                                cleanSub = cleanSub.substring(2);
                            }
                            currentDb[cleanSub] = `${parseFloat(lat).toFixed(6)}, ${parseFloat(lng).toFixed(6)}`;
                        }
                    });

                    localStorage.setItem('locationDatabase', JSON.stringify(currentDb));
                    showToast("✅ এক্সেল ফাইল সফলভাবে ইম্পোর্ট হয়েছে!");
                    event.target.value = '';
                    updateDataStats();
                    loadRecordTable();
                };
                reader.readAsArrayBuffer(file);
            } else if (filename.endsWith('.json')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const importedObj = JSON.parse(e.target.result);
                        const currentDb = JSON.parse(localStorage.getItem('locationDatabase')) || {};
                        
                        // ক্লিন ও মার্জ অপারেশন
                        Object.keys(importedObj).forEach(key => {
                            let cleanKey = key.trim();
                            if(cleanKey.startsWith('11') && cleanKey.length > 6) {
                                cleanKey = cleanKey.substring(2);
                            }
                            currentDb[cleanKey] = importedObj[key];
                        });

                        localStorage.setItem('locationDatabase', JSON.stringify(currentDb));
                        showToast(languages[currentLang].importAlert);
                        event.target.value = '';
                        updateDataStats();
                        loadRecordTable();
                    } catch (err) {
                        showToast(languages[currentLang].invalidAlert);
                    }
                };
                reader.readAsText(file);
            } else {
                showToast("অসমর্থিত ফাইল ফরম্যাট!");
            }
        }

        let currentActiveLocation = "";
        function searchLocation() {
            const searchInput = document.getElementById('search-input').value.trim();
            const db = JSON.parse(localStorage.getItem('locationDatabase')) || {};

            if (!searchInput) {
                showToast(languages[currentLang].emptyAlert);
                return;
            }

            if (db[searchInput]) {
                currentActiveLocation = db[searchInput];
                document.getElementById('res-num').innerText = searchInput;
                document.getElementById('res-loc').innerText = currentActiveLocation;
                document.getElementById('result-box').style.display = 'block';
                document.getElementById('not-found').style.display = 'none';

                const mapArea = document.getElementById('map-area');
                const mapFrame = document.getElementById('map-frame');
                // আইফ্রেমের জন্য এনকোডিং বাগ ফিক্স করা হয়েছে
                mapFrame.src = `https://maps.google.com/maps?q=${encodeURIComponent(currentActiveLocation)}&t=m&z=14&output=embed&iwloc=near`;
                mapArea.style.display = 'block';
            } else {
                document.getElementById('result-box').style.display = 'none';
                document.getElementById('not-found').innerText = languages[currentLang].notFound;
                document.getElementById('not-found').style.display = 'block';
            }
        }

        function saveData() {
            const num = document.getElementById('sub-number').value.trim();
            const loc = document.getElementById('sub-location').value.trim();
            if (!num || !loc) { showToast(languages[currentLang].emptyAlert); return; }

            const db = JSON.parse(localStorage.getItem('locationDatabase')) || {};
            db[num] = loc;
            localStorage.setItem('locationDatabase', JSON.stringify(db));
            showToast(languages[currentLang].saveAlert);
            document.getElementById('sub-number').value = '';
            document.getElementById('sub-location').value = '';
            switchScreen('search-screen', 'nav-search');
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                showToast("লোকেশন খোঁজা হচ্ছে...");
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        document.getElementById('sub-location').value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                        showToast("কারেন্ট লোকেশন সেট হয়েছে!");
                    }, 
                    function() { showToast("জিপিএস পারমিশন প্রয়োজন!"); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function openMap() { 
            if (currentActiveLocation) window.open(`https://maps.google.com/?q=${encodeURIComponent(currentActiveLocation)}`, '_blank'); 
        }
        
        function copyLocation() {
            const num = document.getElementById('res-num').innerText;
            const txt = `সাবস্ক্রিপশন নং: ${num}\nলোকেশন: ${currentActiveLocation}\nম্যাপ: https://maps.google.com/?q=${encodeURIComponent(currentActiveLocation)}`;
            const el = document.createElement("textarea"); el.value = txt; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            showToast(languages[currentLang].copyAlert);
        }

        function shareLocation() {
            const num = document.getElementById('res-num').innerText;
            const txt = `সাবস্ক্রিপশন নং: ${num} | লোকেশন: ${currentActiveLocation} | ম্যাপ: https://maps.google.com/?q=${encodeURIComponent(currentActiveLocation)}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(txt)}`, '_blank');
        }

        function exportData() {
            const blob = new Blob([localStorage.getItem('locationDatabase')], { type: "application/json" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `subscription_backup.json`; a.click();
        }

        function clearMemory() {
            if (confirm("সব ডাটা মুছে ফেলতে চান?")) { localStorage.removeItem('locationDatabase'); showToast(languages[currentLang].clearAlert); setTimeout(() => location.reload(), 1000); }
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        function toggleTheme() { const current = document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark'); }
        changeLanguage('bn');
                function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        function toggleTheme() { const current = document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark'); }
        changeLanguage('bn');
        // ৫টি পার্ট থেকে ডাটা সিঙ্ক করার চূড়ান্ত ইঞ্জিন
        window.addEventListener('DOMContentLoaded', () => {
            const db = JSON.parse(localStorage.getItem('locationDatabase') || '{}');
            if (Object.keys(db).length > 500) {
                updateDataStats();
                if(typeof loadRecordTable === 'function') loadRecordTable();
                return; 
            }

            showToast("সার্ভার থেকে ডাটাবেজ পার্টগুলো সিঙ্ক হচ্ছে...");
            const files = ['part1.json', 'part2.json', 'part3.json', 'part4.json', 'part5.json'];
            let combinedDatabase = {};
            let successfullyLoaded = 0;

            files.forEach(file => {
                fetch(file)
                    .then(response => {
                        if (!response.ok) {
                            const fallbackName = file.charAt(0).toUpperCase() + file.slice(1);
                            return fetch(fallbackName).then(res => {
                                if (!res.ok) throw new Error(`${file} পাওয়া যায়নি!`);
                                return res.json();
                            });
                        }
                        return response.json();
                    })
                    .then(data => {
                        Object.assign(combinedDatabase, data);
                        successfullyLoaded++;

                        const currentDb = JSON.parse(localStorage.getItem('locationDatabase') || '{}');
                        Object.assign(currentDb, combinedDatabase);
                        localStorage.setItem('locationDatabase', JSON.stringify(currentDb));
                        
                        updateDataStats();
                        if(typeof loadRecordTable === 'function') loadRecordTable();
                        
                        if (successfullyLoaded === files.length) {
                            showToast("✅ সবকটি পার্টের ডাটা সফলভাবে সংযুক্ত হয়েছে!");
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        showToast(`⚠️ ${file} সিঙ্ক করা যায়নি!`);
                    });
            });
        });
    </script>
